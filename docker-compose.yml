services:
  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - chess-data:/app/data
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - STOCKFISH_PATH=/usr/games/stockfish
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chess-data:
