map $http_user_agent $is_crawler {
    default 0;
    ~*facebookexternalhit 1;
    ~*Twitterbot 1;
    ~*Discordbot 1;
    ~*Slackbot 1;
    ~*LinkedInBot 1;
    ~*WhatsApp 1;
    ~*TelegramBot 1;
    ~*Googlebot 1;
    ~*bingbot 1;
    ~*redditbot 1;
    ~*Applebot 1;
}

server {
    listen 80;
    server_name llmchess.deadpackets.pw;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # No X-Frame-Options — embed widget (/embed/) needs external framing.
    # Cloudflare handles HSTS at the edge.

    # API proxy (^~ ensures priority over static asset regex)
    location ^~ /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass Cloudflare headers through to backend
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # Health endpoint (proxied to backend)
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # WebSocket proxy (^~ ensures priority over static asset regex)
    location ^~ /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 86400;
    }

    # OG proxy for crawlers on game pages
    location ~ ^/game/(.+)$ {
        if ($is_crawler) {
            rewrite ^/game/(.+)$ /og/game/$1 break;
            proxy_pass http://backend:8000;
        }
        try_files /index.html =404;
    }

    # OG endpoint proxy (direct access)
    location ^~ /og/ {
        proxy_pass http://backend:8000/og/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp3|ogg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
